<!DOCTYPE html>
<html lang="en">
<head>
    <title>Startup HTML</title>
    <link rel="icon" href="Cartoon_space_rocket.png" />
    <meta 
        name="description" 
        content="Internship Command Center helps computer 
        science students track internship applications, 
        LeetCode progress, resume versions, and interview 
        notes in one place."
    >
    <!--Removes automatic mobile scaling to fix impedment with custom css scaling-->
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="stylesheet" href="index.css">
    <!-- <script src="index.js"></script> -->

    <!-- Bootstrap components loaded from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" 
    crossorigin="anonymous" />
</head>
<body>
    <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
        <a href="/" class="d-flex align-items-center col-md-3 mb-2 mb-md-0 text-dark text-decoration-none">
            <h1>Internship Command Center</h1>
        </a>

        <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
            <li><a href="./index.html" class="nav-link px-2 link-secondary">Home</a></li>
            <li><a href="./chat.html" class="nav-link px-2 link-dark">Chat</a></li>
            <li><a href="./profile.html" class="nav-link px-2 link-dark">Profile</a></li>
        </ul>

        <div class="col-md-3 text-end">
            <button type="button" class="btn btn-outline-primary me-2" 
            onclick="window.location.href='./login.html'">Login</button>
            <button type="button" class="btn btn-primary"
            onclick="window.location.href='./login.html'">Sign-up</button>
        </div>
    </header>
    <main>
        <!--main form of collecting data in html is the form tag-->
        <form action="./profile.html" method="get">
            <div class="input-group mb-3">
                <label class="input-group-text" for="username">Username @</label>
                <input class="form-control" id="username" placeholder="username">
            </div>
            <div class="input-group mb-3">
                <label class="input-group-text" for="password">Password 🔒</label>
                <input class="form-control" type="password" id="password" placeholder="password">
            </div>

            <button type="submit">Login</button>
            <button type="submit">Create</button>
        </form>
    </main>
    <footer>
        <span class="text-reset">Benjamin Anderson</span>
        <a href="https://github.com/jmanderson5/startupCS260">Source</a>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
