<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chat HTML</title>
    <meta 
        name="description" 
        content="Internship Command Center helps computer science students track internship applications, interviews, LeetCode progress, resume versions, and interview notes in one place."
    >
</head>
<body>
    <header id="content" class="header-content">
        <h1 role="Application Name">Welcome to Chat HTML!</h1>
        <nav>
            <a href="./login.html">Login</a>
            <a href="./profile.html">Profile</a>
            <a href="./chat.html">Connect</a>
            <a href="./index.html">About</a>
        </nav>
    </header>
    <main>
        <h3>Chat</h3>
        <p>This is the chat section.</p>
        <form id="messageForm">
            <!--Select user to send message to-->
            <label for="recipient">Recipient:</label>
            <select id="recipient" name="recipient">
                <option value="John Doe">John Doe</option>
                <option value="Jane Smith">Jane Smith</option>
                <option value="Bob Johnson">Bob Johnson</option>
            </select>
            <br />
            <!--Enter message to send other program user-->
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" cols="50" 
            placeholder="Type your message here..."></textarea>
            <br />
            <input type="submit" value="Send" />
        </form>
    </main>
    <footer>
        <hr />
        <span class="text-reset">Benjamin Anderson</span>
        <br />
        <a href="https://github.com/jmanderson5/startupCS260">GitHub</a>
    </footer>
</body>
</html>
